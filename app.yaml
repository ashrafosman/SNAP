command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: SERVING_ENDPOINT
    value: databricks-claude-sonnet-4-6

resources:
  - name: databricks-claude-sonnet-4-6
    serving_endpoint:
      name: databricks-claude-sonnet-4-6
      permission: CAN_QUERY
